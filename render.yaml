# Render deployment configuration for this monorepo

services:
  - type: web
    name: backend-laravel
    runtime: docker
    plan: free
    region: oregon
    branch: main
    rootDir: backendToDoList
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: APP_URL
        value: https://backend-laravel.onrender.com
      - key: APP_KEY
        value: base64:9xaF6Vsqb9SeisO2OCSvskMOcnf68UoFcjWYee+UgDA=
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: '5432'
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require

  - type: web
    name: frontend-angular
    runtime: static
    branch: main
    rootDir: my-first-angular-app
    buildCommand: npm install && npm run build -- --configuration production
    staticPublishPath: dist/my-first-angular-app/browser

# Notes:
# - After pushing this file, connect the repo to Render and deploy.
# - The backend deploys via Docker (see backendToDoList/Dockerfile) — Render has no native PHP runtime.
# - APP_KEY above was pre-generated (php artisan key:generate --show) so it stays stable across
#   deploys. Rotate it from the Render dashboard if it is ever exposed; do not regenerate it on
#   every build, or existing sessions/encrypted data will break each deploy.
# - Migrations run at container startup (see the Dockerfile CMD) rather than as a Render
#   pre-deploy step, since preDeployCommand requires a paid plan. `php artisan migrate --force`
#   is idempotent, so re-running it on every restart is safe.
# - The database is the existing external Neon Postgres instance (not a Render-managed database —
#   there is no `databases:` block on purpose). DB_HOST, DB_DATABASE, DB_USERNAME, and DB_PASSWORD
#   are marked `sync: false`, so set them manually in the Render dashboard using the same values
#   as backendToDoList/.env (never commit those values to this file).
# - The Angular frontend's API base URL comes from src/environments/environment.prod.ts — update
#   it there if the backend's actual Render URL differs from the default above.
# - Do not set NODE_ENV=production on the frontend service: it makes `npm install` skip
#   devDependencies, where @angular/cli lives, breaking `ng build` with "ng: not found".
#   Angular's own production optimizations come from `--configuration production`, not NODE_ENV.
# - Adjust service names, branch, or region to match your Render setup.
